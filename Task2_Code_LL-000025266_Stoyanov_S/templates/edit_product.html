{% extends "base.html" %}
{% block content %}

<div class="form-container">
    <h1>Edit Product</h1>

    <form method="POST">

        <input name="name" value="{{ product.name }}" placeholder="Product Name" required>

        <input name="price" type="number" step="0.01"
               value="{{ product.price }}" placeholder="Price" required>

        <input name="stock" type="number"
               value="{{ product.stock }}" placeholder="Stock" required>

        <input name="image"
               value="{{ product.image }}" placeholder="Image URL">

        <!-- ADD THIS (CATEGORY FIX) -->
        <select name="category" required>
            {% for cat in categories %}
                <option value="{{ cat.id }}"
                    {% if cat.id == product.category_id %}selected{% endif %}>
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>

        <!-- DESCRIPTION -->
        <textarea name="description"
                  placeholder="Product Description"
                  rows="4"
                  required>{{ product.description }}</textarea>

        <button type="submit">Update Product</button>

    </form>
</div>

{% endblock %}
